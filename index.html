<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宇守信财税 · 每日经济早报</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      color: #333;
    }
    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    header {
      text-align: center;
      padding: 60px 0 40px;
    }
    header h1 {
      font-size: 2.2em;
      color: #1a1a2e;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }
    header .subtitle {
      font-size: 1.1em;
      color: #666;
      font-weight: 300;
    }
    header .divider {
      width: 80px;
      height: 3px;
      background: #4a6fa5;
      margin: 20px auto;
      border-radius: 2px;
    }
    .hero {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }
    .hero p {
      font-size: 1.05em;
      line-height: 1.8;
      color: #555;
    }
    .daily-section {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }
    .daily-section h2 {
      font-size: 1.4em;
      color: #1a1a2e;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid #eef1f5;
    }
    .daily-section .date-badge {
      display: inline-block;
      background: #4a6fa5;
      color: white;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.85em;
      margin-bottom: 15px;
    }
    .news-item {
      padding: 14px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item .time { color: #999; font-size: 0.85em; margin-right: 10px; }
    .news-item .title { color: #333; line-height: 1.6; }
    footer {
      text-align: center;
      padding: 30px 0;
      color: #999;
      font-size: 0.9em;
    }
    footer a { color: #4a6fa5; text-decoration: none; }
    @media (max-width: 640px) {
      header h1 { font-size: 1.6em; }
      .hero, .daily-section { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>宇守信财税</h1>
      <p class="subtitle">每日经济早报</p>
      <div class="divider"></div>
    </header>

    <div class="hero">
      <p>欢迎访问 <strong>宇守信财税 · 每日经济早报</strong>。在这里，我们将每日为您精选国内外重要的经济资讯、政策解读与市场动态，助您把握经济脉搏，洞察财富先机。</p>
    </div>

    <div class="daily-section">
      <h2>📰 今日早报</h2>
      <span class="date-badge" id="today-date"></span>
      <div id="news-content">
        <div class="news-item">
          <span class="time">[待更新]</span>
          <span class="title">今日早报内容正在更新中，敬请期待...</span>
        </div>
      </div>
    </div>

    <footer>
      <p>© 2025 <a href="https://github.com/Sparrow528">宇守信财税</a> · 每日经济早报</p>
      <p style="margin-top: 5px; font-size: 0.85em;">数据仅供参考，不构成投资建议</p>
    </footer>
  </div>

  <script>
    // 自动显示今日日期
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, '0');
    const d = String(now.getDate()).padStart(2, '0');
    const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
    const w = weekdays[now.getDay()];
    document.getElementById('today-date').textContent = y + '年' + m + '月' + d + '日 星期' + w;
  </script>
</body>
</html>
